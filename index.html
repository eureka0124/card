<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>백용길 | 웹 명함</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0c0e14;
      --bg-2: #151a28;
      --card: rgba(22, 28, 42, 0.72);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #5eead4;
      --accent-dim: rgba(94, 234, 212, 0.15);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans KR", system-ui, sans-serif;
      min-height: 100dvh;
      color: var(--text);
      background:
        radial-gradient(ellipse 120% 80% at 10% 0%, rgba(94, 234, 212, 0.12), transparent 50%),
        radial-gradient(ellipse 100% 60% at 100% 100%, rgba(99, 102, 241, 0.14), transparent 55%),
        linear-gradient(165deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 2.25rem 2rem 2rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--accent), #6366f1);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.03em;
      margin-bottom: 0.35rem;
    }

    .role {
      text-align: center;
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .role span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.9rem;
    }

    .bio {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.65;
      margin-bottom: 1.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--accent-dim);
      border: 1px solid rgba(94, 234, 212, 0.22);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .links a:hover {
      transform: translateY(-1px);
      border-color: rgba(94, 234, 212, 0.45);
      background: rgba(94, 234, 212, 0.22);
    }

    .links a.secondary {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--card-border);
    }

    .links a.secondary:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.07);
    }

    .links a .icon {
      font-size: 1rem;
      opacity: 0.9;
    }

    .links a .linkedin-icon {
      flex-shrink: 0;
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <article class="card" aria-label="디지털 명함">
    <div class="avatar" aria-hidden="true">
      <img src="assets/avatar.png" alt="백용길 프로필 캐릭터" />
    </div>
    <h1>백용길</h1>
    <p class="role">경영지도사 · 빅데이터분석기사</p>
    <p class="bio">
      데이터 기반 경영 컨설팅으로 기업의 성장을 이끕니다.
    </p>
    <nav class="links" aria-label="연락처">
      <a href="mailto:eureka0124@gmail.com">
        <span class="icon">✉</span> eureka0124@gmail.com
      </a>
      <a class="secondary" href="tel:010-8396-6683">
        <span class="icon">📞</span> 010-8396-6683
      </a>
      <a class="secondary" href="https://www.linkedin.com/feed/" target="_blank" rel="noopener noreferrer">
        <svg class="icon linkedin-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg> LinkedIn
      </a>
    </nav>
    <footer>웹 명함 · 브라우저에서 열어 공유하세요</footer>
  </article>

  <script>
    // 명함 클릭 시 부드러운 카드 애니메이션
    document.querySelector('.card').addEventListener('click', function(e) {
      this.style.transform = 'translateY(-4px) scale(1.02)';
      setTimeout(() => {
        this.style.transform = '';
      }, 200);
    });
  </script>
</body>
</html>
